<!DOCTYPE html>
<html>
<head>
    <title>Zomato Internal Delivery Intelligence</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container-fluid p-5">

    <div class="text-center mb-5">
        <h1 class="brand-title">ZOMATO</h1>
        <h4 class="subtitle">Delivery Intelligence Control Panel</h4>
    </div>

    <div class="row g-4">

        <!-- LEFT PANEL -->
        <div class="col-lg-5">
            <div class="glass-card p-4">

                <h5 class="section-title mb-3">Order Configuration</h5>

                <form action="/predict" method="post">

                    <input class="form-control custom-input mb-2" name="Delivery_person_Age" placeholder="Delivery Age" required>
                    <input class="form-control custom-input mb-2" name="Delivery_person_Ratings" placeholder="Ratings" required>
                    <input class="form-control custom-input mb-2" name="Vehicle_condition" placeholder="Vehicle Condition (0-3)" required>
                    <input class="form-control custom-input mb-2" name="multiple_deliveries" placeholder="Multiple Deliveries" required>
                    <input class="form-control custom-input mb-2" name="distance_km" placeholder="Distance (km)" required>
                    <input class="form-control custom-input mb-2" name="pickup_delay_minutes" placeholder="Pickup Delay (min)" required>
                    <input class="form-control custom-input mb-2" name="order_hour" placeholder="Order Hour" required>
                    <input class="form-control custom-input mb-2" name="order_minute" placeholder="Order Minute" required>
                    <input class="form-control custom-input mb-3" name="order_day_of_week" placeholder="Day of Week (0-6)" required>

                    <select class="form-select custom-input mb-2" name="Weather_conditions" required>
                        <option value="" disabled selected hidden>Select Weather</option>
                        <option value="Sunny">Sunny</option>
                        <option value="Cloudy">Cloudy</option>
                        <option value="Fog">Fog</option>
                        <option value="Stormy">Stormy</option>
                    </select>

                    <select class="form-select custom-input mb-2" name="Road_traffic_density" required>
                        <option value="" disabled selected hidden>Select Traffic</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Jam">Jam</option>
                    </select>

                    <select class="form-select custom-input mb-2" name="Type_of_order" required>
                        <option value="" disabled selected hidden>Select Order Type</option>
                        <option value="Snack">Snack</option>
                        <option value="Meal">Meal</option>
                        <option value="Drinks">Drinks</option>
                    </select>

                    <select class="form-select custom-input mb-2" name="Type_of_vehicle" required>
                        <option value="" disabled selected hidden>Select Vehicle Type</option>
                        <option value="motorcycle">motorcycle</option>
                        <option value="scooter">scooter</option>
                        <option value="bicycle">bicycle</option>
                    </select>

                    <select class="form-select custom-input mb-2" name="Festival" required>
                        <option value="" disabled selected hidden>Select Festival</option>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>

                    <select class="form-select custom-input mb-3" name="City" required>
                        <option value="" disabled selected hidden>Select City</option>
                        <option value="Metropolitian">Metropolitian</option>
                        <option value="Urban">Urban</option>
                        <option value="Semi-Urban">Semi-Urban</option>
                    </select>

                    <button class="btn btn-danger w-100 btn-lg custom-btn">
                        Run Prediction
                    </button>

                </form>
            </div>
        </div>


        <div class="col-lg-7">
            <div class="glass-card p-5 text-center">

                {% if prediction %}

                <h4 class="section-title">Estimated Delivery Time</h4>
                <h1 class="prediction-value">{{ prediction }} mins</h1>

                <div class="risk-badge bg-{{ risk_color }}">
                    Risk: {{ risk_text }}
                </div>

                <p class="confidence-text">
                    Model Confidence: {{ confidence }}%
                </p>

                <canvas id="importanceChart" class="mt-4"></canvas>

                <script>
                    const ctx = document.getElementById('importanceChart');

                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Distance', 'Traffic', 'Pickup Delay', 'Vehicle Condition'],
                            datasets: [{
                                label: 'Feature Impact',
                                data: [35, 25, 20, 10],
                                backgroundColor: '#E23744'
                            }]
                        },
                        options: {
                            plugins: { legend: { labels: { color: "white" } } },
                            scales: {
                                x: { ticks: { color: "white" } },
                                y: { ticks: { color: "white" } }
                            }
                        }
                    });
                </script>

                {% else %}
                <h4 class="placeholder-text">Prediction output will appear here</h4>
                {% endif %}

            </div>
        </div>

    </div>
</div>

</body>
</html>
